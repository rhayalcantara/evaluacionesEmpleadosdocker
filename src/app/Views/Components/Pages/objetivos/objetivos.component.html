<div class="shadow p-3 mb-5 bg-body rounded my-4 ">
    <h2 class="mb-3">Mantenimiento de Competencias</h2>
    <div class=" col-md-8 col-lg-8 col-xl-8 my-3 ">
      <button class="btn  float-end" (click)="excel()"><i class="fa fa-file-excel-o"></i></button>
      <button class="btn  float-end" (click)="pdf()"><i class="fa fa-print"></i></button>
    </div>
    <div class=" col-md-4 col-lg-4 col-xl-4" style="display:inline;">
      <div class="d-flex gap-2 mb-2">
        <button class="btn btn-outline-success" data-toggle="modal"
                data-bs-target="#exampleModal" (click)="agregar()">
          Agregar
        </button>
        <button class="btn btn-outline-primary" (click)="iniciarCopia()">
          <i class="fa fa-copy"></i> Copiar competencias...
        </button>
      </div>

      <div *ngIf="mostrarCopia" class="card p-3 mb-3">
        <h6>Copiar competencias de un período a otro</h6>
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label small">Período origen</label>
            <select class="form-control form-control-sm" [(ngModel)]="periodoOrigenId">
              <option value="0">Seleccione...</option>
              <option *ngFor="let p of periodos" [value]="p.id">{{p.descripcion}}</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label small">Período destino</label>
            <select class="form-control form-control-sm" [(ngModel)]="periodoDestinoId">
              <option value="0">Seleccione...</option>
              <option *ngFor="let p of periodos" [value]="p.id">{{p.descripcion}}</option>
            </select>
          </div>
          <div class="col-md-4 d-flex gap-2">
            <button class="btn btn-success btn-sm" (click)="confirmarCopia()"
                    [disabled]="!+periodoOrigenId || !+periodoDestinoId || +periodoOrigenId === +periodoDestinoId || copiando">
              {{copiando ? 'Copiando...' : 'Confirmar'}}
            </button>
            <button class="btn btn-secondary btn-sm" (click)="cancelarCopia()">Cancelar</button>
          </div>
        </div>
      </div>

      <div class="mb-2">
        <select class="form-control" [(ngModel)]="periodoFiltroId" (change)="filtrarPorPeriodo()">
          <option value="0">Todos los períodos</option>
          <option *ngFor="let p of periodos" [value]="p.id">{{p.descripcion}}</option>
        </select>
      </div>

      <div class="input-group mb-3">
        <input aria-describedby="basic-addon2"
              aria-label="Search" class="form-control" placeholder="Search for..."
              type="text"
              [(ngModel)]="term"
              (change)="filtro()" >
        <div class="input-group-append">
          <button class="btn btn-primary" type="button" >
          <svg role="img" aria-hidden="true" focusable="false" data-prefix="fas" data-icon="search" width="24" height="24" viewBox="0 0 24 24"
            class="svg-inline--fa fa-search fa-w-16" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path fill="currentColor" d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z">
            </path>
          </svg>
        </button>
      </div>
      </div>  
    </div>
    <div  class="-mx-4 sm:-mx-8 px-4 sm:px-8 py-4 overflow-x-auto">
      <app-tables 
      [arraydatos]="objetivoController.arraymodel"
      campokey="id"
      (accion)="opcion($event)"
      (paginacambio)="paginacambio($event)"
      (idtable)="actualizaelidtable($event)" 
      [campos]="campos"
      [titulos]="tituloslocal"
      [term]="term"
      [totalregistros]="objetivoController.totalregistros"
      [currentPage]="objetivoController.actualpage"
      [config]="config"
    ></app-tables>  
</div>
